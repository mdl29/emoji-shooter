<!DOCTYPE html>
<html lang="fr">
<head>

  <button id="connect">Connecter</button>

            <span>Cible 1:</span>

              <option value="cry">Cry</option>
            </select>

        </div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <h1>Emoji Shooter</h1>
    </div>

    <div class="game-area">
      <img src="asset/targets/christian.svg" alt="Personnage" class="character">
    </div>
